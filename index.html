<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đang chuyển đến trang chủ…</title>
    <meta http-equiv="refresh" content="0; url=landing-pro1.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #fdebdb;
        --magenta: #9e2a6b;
        --cta: #c24b8e;
        --text: #444;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(165deg, var(--cream) 0%, #fff 42%, #fff 100%);
      }

      .gate {
        max-width: 420px;
        width: 100%;
        text-align: center;
        padding: 2rem 1.75rem 2.25rem;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 20px;
        border: 1px solid rgba(158, 42, 107, 0.12);
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.04),
          0 16px 40px rgba(158, 42, 107, 0.12);
      }

      .gate__logo {
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--magenta);
        margin-bottom: 1rem;
      }

      .gate__title {
        margin: 0 0 0.75rem;
        font-size: 1.15rem;
        font-weight: 700;
        color: #2d2d2d;
        line-height: 1.35;
      }

      .gate__hint {
        margin: 0 0 1.5rem;
        font-size: 0.95rem;
        line-height: 1.55;
        color: var(--text);
      }

      .gate__btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin: 0 auto;
        padding: 0.85rem 1.75rem;
        border: none;
        border-radius: 999px;
        font: inherit;
        font-weight: 700;
        font-size: 0.95rem;
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        background: linear-gradient(165deg, var(--cta) 0%, #a83d7a 100%);
        box-shadow:
          0 4px 14px rgba(194, 75, 142, 0.35),
          0 2px 6px rgba(0, 0, 0, 0.06);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }

      .gate__btn:hover {
        filter: brightness(1.04);
        transform: translateY(-1px);
        box-shadow:
          0 6px 20px rgba(194, 75, 142, 0.42),
          0 4px 10px rgba(0, 0, 0, 0.08);
      }

      .gate__btn:active {
        transform: translateY(0);
      }

      .gate__btn:focus-visible {
        outline: 2px solid var(--magenta);
        outline-offset: 4px;
      }

      .gate__btn svg {
        width: 1.1em;
        height: 1.1em;
        flex-shrink: 0;
      }

      .gate__sub {
        margin: 1.25rem 0 0;
        font-size: 0.8rem;
        color: #777;
      }

      .gate__sub a {
        color: var(--magenta);
        font-weight: 600;
        text-decoration: none;
      }

      .gate__sub a:hover {
        text-decoration: underline;
      }
    </style>
    <script>
      window.location.replace("landing-pro1.html");
    </script>
  </head>
  <body>
    <div class="gate">
      <div class="gate__logo">Tourguide · Tourist</div>
      <p class="gate__title">Đang mở trang English…</p>
      <p class="gate__hint">Bấm vào đây nếu trang không tự mở</p>
      <a class="gate__btn" href="landing-pro1.html">
        Vào landing English
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" aria-hidden="true">
          <path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <p class="gate__sub">
        Hoặc <a href="landing-pro1-vi.html">phiên bản Tiếng Việt</a> ·
        <a href="explore-3-tours.html">Explore 3 tours</a>
      </p>
    </div>
  </body>
</html>
